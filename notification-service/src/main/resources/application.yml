server:
  port: 8086

spring:
  application:
    name: notification-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    sentinel:
      transport:
        dashboard: localhost:8080
        port: 8722
      eager: true
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

jwt:
  secret: railway-ticket-system-secret-key-2024
  expire: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info
